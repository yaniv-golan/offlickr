name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv sync --all-extras --dev
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy src tests
      - name: Conventional Commits (PR)
        if: github.event_name == 'pull_request'
        run: |
          uv run cz check --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write  # for Codecov OIDC
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # diff-cover needs main's history
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --all-extras --dev
      - run: uv run pytest --cov=offlickr --cov-report=xml --cov-report=term-missing
      - name: Patch coverage vs main
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          uv run diff-cover coverage.xml --compare-branch=origin/${{ github.event.pull_request.base.ref }} --fail-under=80
      - uses: codecov/codecov-action@v6
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        with:
          use_oidc: true
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv build
      - name: Reproducible-build smoke test
        run: |
          mv dist dist-1
          uv build
          mv dist dist-2
          diff -r dist-1 dist-2
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist-1/

  audit:
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory in v1 per spec §13.2
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - run: uv sync --all-extras --dev
      - run: uv run pip-audit --strict

  docs:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npx -y markdownlint-cli2 "**/*.md" "#node_modules"
